<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Malabennur Town Municipal Council</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(
                rgba(0,0,0,0.45),
                rgba(0,0,0,0.45)
            ),
            url("{{ url_for('static', filename='images/background.avif') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 10px 16px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
        }
        
        .login-header {
            background: linear-gradient(135deg, #4B0082 0%, #6A0DAD 50%, #9370DB 100%);
            padding: 25px 25px;
            text-align: center;
            color: white;
            position: relative;
        }
        
        .login-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/></svg>');
            background-size: 30px 30px;
            opacity: 0.5;
            pointer-events: none;
        }

        .login-header .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 0px; 
            background: none;
            width: 100%;
        }

        .login-header .logo img {
            max-width: 100%;
            width: 340px;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
        
        .login-header h2 {
            margin: -15px 0 0 0; /* Added negative top margin to pull it directly beneath the logo asset */
            font-weight: 700;
            font-size: 1.4rem;
            line-height: 1.5; 
            position: relative;
        }
        
        .login-header p {
            margin: 8px 0 0;
            font-size: 0.95rem;
            opacity: 0.95;
            position: relative;
        }
        
        .login-body {
            padding: 30px 25px;
        }

        .login-body .alert {
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }
        
        .input-group-text {
            border: 2px solid #e0e0e0;
            border-right: none;
            background: #f8f9fa;
            color: #6A0DAD;
        }
        
        .form-control {
            padding: 12px 15px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #6A0DAD;
            box-shadow: 0 0 0 4px rgba(106, 13, 173, 0.1);
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 14px;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #4B0082 0%, #6A0DAD 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(106, 13, 173, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        .register-link a {
            color: #6A0DAD;
            font-weight: 700;
            text-decoration: none;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        .forgot-link {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        
        .forgot-link a {
            color: #888;
            font-size: 13px;
            text-decoration: none;
        }
        
        .forgot-link a:hover {
            color: #6A0DAD;
            text-decoration: underline;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            padding: 0 15px;
            color: #999;
            font-size: 13px;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 12px;
            }

            .login-card {
                border-radius: 16px;
            }

            .login-header {
                padding: 25px 15px;
            }

            .login-header h2 {
                font-size: 1.2rem;
                line-height: 1.5;
                margin-top: -10px; /* Adjusted mobile view relative gap offset */
            }
            
            .login-header p {
                font-size: 0.85rem;
            }

            .login-header .logo img {
                width: 180px;
            }

            .login-body {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="MTMC Logo">
                </div>
                <h2>Malabennur Town Municipal Council</h2>
                <p>Grievance Redressal System</p>
            </div>
            <div class="login-body">
                {% block auth_content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
