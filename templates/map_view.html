{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    /* Main container */
    .map-wrapper {
        position: relative;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }
    
    #map { 
        height: 70vh; 
        width: 100%; 
    }
    
    /* Top Bar - Full Width */
    .map-top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        background: linear-gradient(135deg, #4B0082, #6A0DAD);
        color: white;
    }
    
    .map-title {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .map-title h4 {
        margin: 0;
        font-weight: 600;
    }
    
    .map-title p {
        margin: 0;
        font-size: 12px;
        opacity: 0.9;
    }
    
    /* Search Row */
    .search-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }
    
    .search-row input {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        width: 280px;
        font-size: 14px;
    }
    
    .search-row button {
        padding: 10px 20px;
        background: white;
        color: #4B0082;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
    }
    
    .search-row button:hover {
        background: #f0f0f0;
    }
    
    /* Quick Buttons */
    .quick-buttons {
        display: flex;
        gap: 8px;
    }
    
    .quick-buttons button {
        padding: 8px 15px;
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
    }
    
    .quick-buttons button:hover {
        background: rgba(255,255,255,0.3);
    }
    
    /* Bottom Bar */
    .map-bottom-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        background: #f8f9fa;
        border-top: 1px solid #eee;
    }
    
    /* Legend */
    .legend {
        display: flex;
        gap: 20px;
    }
    
    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
    }
    
    .legend-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
    }
    
    /* Complaint Count Badge */
    .complaint-badge {
        background: white;
        padding: 8px 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .complaint-badge span {
        color: #4B0082;
        font-weight: 700;
        font-size: 18px;
    }
    
    /* My Location Button */
    .my-location-btn {
        padding: 10px 20px;
        background: #4B0082;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .my-location-btn:hover {
        background: #6A0DAD;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .map-top-bar {
            flex-direction: column;
            gap: 15px;
        }
        .search-row input {
            width: 100%;
        }
        .quick-buttons {
            width: 100%;
            justify-content: center;
        }
        .map-bottom-bar {
            flex-direction: column;
            gap: 15px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="mb-3" style="color: #4B0082;">
            <i class="fas fa-map-marked-alt me-2"></i>Grievance Map
        </h2>
    </div>
</div>

<!-- Map Wrapper -->
<div class="map-wrapper">
    <!-- Top Header Bar -->
    <div class="map-top-bar">
        <div class="map-title">
            <div>
                <h4><i class="fas fa-map-marker-alt me-2"></i>Malebennur Town</h4>
                <p>Davanagere District, Karnataka</p>
            </div>
        </div>
        
        <!-- Search -->
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Search location in Malebennur...">
            <button onclick="searchLocation()">
                <i class="fas fa-search me-2"></i>Search
            </button>
        </div>
        
        <!-- Quick Buttons -->
        <div class="quick-buttons">
            <button onclick="goToTown()">
                <i class="fas fa-city me-1"></i>Town
            </button>
            <button onclick="goToNorth()">
                <i class="fas fa-arrow-up me-1"></i>North
            </button>
            <button onclick="goToSouth()">
                <i class="fas fa-arrow-down me-1"></i>South
            </button>
            <button onclick="resetView()">
                <i class="fas fa-expand me-1"></i>Full
            </button>
        </div>
    </div>
    
    <!-- Map -->
    <div id="map"></div>
    
    <!-- Bottom Bar -->
    <div class="map-bottom-bar">
        <!-- Legend -->
        <div class="legend">
            <span style="color: #666; font-weight: 600;">Legend:</span>
            <div class="legend-item">
                <div class="legend-dot" style="background: #F44336;"></div>
                <span>New</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #FF9800;"></div>
                <span>In Progress</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #4CAF50;"></div>
                <span>Resolved</span>
            </div>
        </div>
        
        <!-- Complaint Count -->
        <div class="complaint-badge">
            <small style="color: #666;">Total Complaints</small><br>
            <span id="totalCount">0</span>
        </div>
        
        <!-- My Location -->
        <button class="my-location-btn" onclick="goToMyLocation()">
            <i class="fas fa-crosshairs"></i>My Location
        </button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Malebennur coordinates
    var defaultCenter = [14.35335, 75.73843];
    var bounds = [[14.30, 75.65], [14.42, 75.85]];
    
    // Initialize map
    var map = L.map('map').setView(defaultCenter, 13);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxBounds: bounds,
        maxBoundsViscosity: 0.5
    }).addTo(map);
    
    // Boundary
    L.rectangle(bounds, {
        color: '#4B0082',
        weight: 2,
        fillColor: '#9370DB',
        fillOpacity: 0.05
    }).addTo(map);

    var markers = [];

    // Navigation functions
    function goToTown() {
        map.setView([14.35335, 75.73843], 14);
    }
    
    function goToNorth() {
        map.setView([14.37, 75.75], 13);
    }
    
    function goToSouth() {
        map.setView([14.33, 75.72], 13);
    }
    
    function resetView() {
        map.setView([14.35335, 75.73843], 13);
    }
    
    function goToMyLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                },
                function(err) {
                    alert('Location error: ' + err.message);
                }
            );
        } else {
            alert('Geolocation not supported');
        }
    }

    // Search
    function searchLocation() {
        var query = document.getElementById('searchInput').value;
        if (!query) return;
        
        fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query + ', Malebennur, Karnataka'))
            .then(r => r.json())
            .then(data => {
                if (data.length > 0) {
                    map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 16);
                } else {
                    alert('Location not found');
                }
            });
    }

    // Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchLocation();
    });

    // Load complaints
    function loadComplaints() {
        fetch('/api/complaints/geojson')
            .then(r => r.json())
            .then(data => {
                markers.forEach(m => map.removeLayer(m));
                markers = [];
                document.getElementById('totalCount').innerText = data.features.length;
                
                data.features.forEach(f => {
                    var c = f.geometry.coordinates;
                    var p = f.properties;
                    var color = p.status === 'Resolved' ? '#4CAF50' : p.status === 'In Progress' ? '#FF9800' : '#F44336';
                    
                    var m = L.circleMarker([c[1], c[0]], {
                        radius: 12,
                        fillColor: color,
                        color: '#fff',
                        weight: 2,
                        fillOpacity: 0.9
                    }).addTo(map);
                    
                    m.bindPopup('<b>ID:</b> ' + p.id + '<br><b>Category:</b> ' + p.category + '<br><b>Status:</b> ' + p.status);
                    markers.push(m);
                });
            });
    }

    loadComplaints();
</script>
{% endblock %}
